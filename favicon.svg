<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0a" rx="20"/>
  
  <!-- Scissors blade (left) -->
  <path d="M 35 30 Q 30 35 30 50 Q 30 65 35 70" stroke="#d4af37" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Scissors blade (right) -->
  <path d="M 65 30 Q 70 35 70 50 Q 70 65 65 70" stroke="#d4af37" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Scissors handle (left) -->
  <circle cx="25" cy="25" r="3" fill="#d4af37"/>
  
  <!-- Scissors handle (right) -->
  <circle cx="75" cy="75" r="3" fill="#d4af37"/>
  
  <!-- Center line -->
  <line x1="50" y1="25" x2="50" y2="75" stroke="#d4af37" stroke-width="2" opacity="0.5"/>
  
  <!-- Razor blade accent -->
  <path d="M 50 35 L 55 50 L 50 65" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.8"/>
</svg>
